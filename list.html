<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width" />
  <title>Lists</title>
    </head>

    <body>
        <h2> ordered HTML list:</h2>
        <ol>
    <li>First drink</li>
    <li>Second drink</li>
    <li>Third drink</li>
    <li>Fourth drink</li>
        </ol>

        <h2> unordered HTML list:</h2>
        <ul>
           <li>drink</li>
           <li>drink</li>
           <li>drink</li>
           <li>drink</li>
        </ul>

        <h2>Definition list:</h2>
        <dl>
            <dt>Tea</dt>
            <dd>-hot drink</dd>

            <dt>Juice</dt>
            <dd>-ice drink</dd>
        </dl>
    </body>
</html>
